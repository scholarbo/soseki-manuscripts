<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>漱石漢詩原稿・草稿ビューア</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #e5e7eb;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #eef2f7;
      --accent-line: #d6deea;
      --sidebar-w: 360px;
      --shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    }
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      gap: 14px;
      width: 100%;
      height: 100%;
      padding: 14px;
    }
    .sidebar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 300px;
    }
    .header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fafbfc 100%);
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
    }
    .sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .search-wrap {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--line);
    }
    .search {
      width: 100%;
      border: 1px solid var(--line);
      background: #fbfbfc;
      border-radius: 14px;
      padding: 11px 13px;
      font-size: 14px;
      outline: none;
    }
    .search:focus {
      border-color: #cbd5e1;
      background: #fff;
    }
    .meta {
      padding: 0 18px 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .list {
      overflow: auto;
      padding: 8px 10px 14px;
      flex: 1;
    }
    .item {
      padding: 10px 12px;
      border-radius: 14px;
      cursor: pointer;
      margin: 4px 0;
      border: 1px solid transparent;
      transition: 0.15s ease;
    }
    .item:hover {
      background: #fafafa;
      border-color: #f0f0f0;
    }
    .item.active {
      background: var(--accent);
      border-color: var(--accent-line);
    }
    .seq {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .label {
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }
    .viewer-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .viewer-header {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fafbfc 100%);
    }
    .viewer-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 6px;
    }
    .viewer-meta {
      display: grid;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .viewer-meta strong {
      color: var(--text);
      font-weight: 600;
    }
    .notice {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      font-size: 12px;
      color: #4b5563;
      line-height: 1.5;
    }
    iframe {
      width: 100%;
      height: calc(100% - 150px);
      border: 0;
      background: #fff;
    }
    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 40% 1fr;
      }
      .sidebar {
        min-height: 260px;
      }
      iframe {
        height: calc(100% - 170px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="header">
        <div class="title">漱石漢詩原稿・草稿ビューア</div>
        <div class="sub">左側に固定の総目录、右側に Mirador。前十首版。</div>
      </div>
      <div class="search-wrap">
        <input id="search" class="search" type="text" placeholder="番号・題名で検索" />
      </div>
      <div class="meta">点击左侧条目，在右侧打开对应作品。</div>
      <div id="list" class="list"></div>
    </aside>

    <main class="viewer-wrap">
      <div class="viewer-header">
        <div id="currentTitle" class="viewer-title">読み込み中…</div>
        <div class="viewer-meta">
          <div><strong>file:</strong> <span id="currentId"></span></div>
          <div><strong>引用元:</strong> <span id="currentSource"></span></div>
          <div><strong>manifest:</strong> <span id="currentManifest"></span></div>
        </div>
        <div class="notice">表示中の画像はシステム検証用の仮画像であり、原資料そのものではありません。</div>
      </div>
      <iframe id="frame"></iframe>
    </main>
  </div>

  <script>
    const base = "https://scholarbo.github.io/soseki-manuscripts";
    const items = [{"id": "001-kodai-01", "title": "001. 鴻台〔二首・其一〕", "source": "", "manifest": "https://scholarbo.github.io/soseki-manuscripts/manifests/manifest-001-kodai-01.json"}, {"id": "002-kodai-02", "title": "002. 鴻台〔二首・其二〕", "source": "", "manifest": "https://scholarbo.github.io/soseki-manuscripts/manifests/manifest-002-kodai-02.json"}, {"id": "003-daiga", "title": "003. 題画", "source": "", "manifest": "https://scholarbo.github.io/soseki-manuscripts/manifests/manifest-003-daiga.json"}, {"id": "004-okuda-kikoku", "title": "004. 送奥田詞兄帰国", "source": "", "manifest": "https://scholarbo.github.io/soseki-manuscripts/manifests/manifest-004-okuda-kikoku.json"}, {"id": "005-rishu-jiyujin-in", "title": "005. 離愁次友人韻", "source": "", "manifest": "https://scholarbo.github.io/soseki-manuscripts/manifests/manifest-005-rishu-jiyujin-in.json"}, {"id": "006-sokuji", "title": "006. 即時", "source": "", "manifest": "https://scholarbo.github.io/soseki-manuscripts/manifests/manifest-006-sokuji.json"}, {"id": "007-sokuji-01", "title": "007. 即時〔二首·其一〕", "source": "", "manifest": "https://scholarbo.github.io/soseki-manuscripts/manifests/manifest-007-sokuji-01.json"}, {"id": "008-sokuji-02", "title": "008. 即時〔二首·其二〕", "source": "", "manifest": "https://scholarbo.github.io/soseki-manuscripts/manifests/manifest-008-sokuji-02.json"}, {"id": "009-nanakusa-01", "title": "009. 〔「『七草集』評」より九首・其一〕明治二十二年五月", "source": "", "manifest": "https://scholarbo.github.io/soseki-manuscripts/manifests/manifest-009-nanakusa-01.json"}, {"id": "010-nanakusa-02", "title": "010. 〔「『七草集』評」より九首・其二〕明治二十二年五月", "source": "", "manifest": "https://scholarbo.github.io/soseki-manuscripts/manifests/manifest-010-nanakusa-02.json"}];

    const list = document.getElementById("list");
    const frame = document.getElementById("frame");
    const search = document.getElementById("search");
    const currentTitle = document.getElementById("currentTitle");
    const currentId = document.getElementById("currentId");
    const currentSource = document.getElementById("currentSource");
    const currentManifest = document.getElementById("currentManifest");

    function renderList(filter = "") {
      list.innerHTML = "";
      const q = (filter || "").toLowerCase();

      items
        .filter(item => item.id.toLowerCase().includes(q) || item.title.toLowerCase().includes(q))
        .forEach((item) => {
          const div = document.createElement("div");
          div.className = "item";
          div.dataset.id = item.id;
          div.innerHTML = `<div class="seq">${item.id}</div><div class="label">${item.title}</div>`;
          div.onclick = () => openManifest(item);
          list.appendChild(div);
        });
    }

    function openManifest(item) {
      frame.src = `${base}/mirador-frame.html?manifest=${encodeURIComponent(item.manifest)}`;
      currentTitle.textContent = item.title;
      currentId.textContent = item.id;
      currentSource.textContent = item.source || "未記入";
      currentManifest.textContent = item.manifest;
      [...document.querySelectorAll(".item")].forEach(el => {
        el.classList.toggle("active", el.dataset.id === item.id);
      });
    }

    search.addEventListener("input", e => {
      renderList(e.target.value);
    });

    renderList();
    openManifest(items[0]);
  </script>
</body>
</html>
