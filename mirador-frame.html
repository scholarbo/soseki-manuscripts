<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mirador Frame</title>
  <script src="https://unpkg.com/mirador@3.3.0/dist/mirador.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/mirador@3.3.0/dist/css/mirador-combined.min.css" />
  <style>
    html, body, #viewer {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #fff;
    }
  </style>
</head>
<body>
  <div id="viewer"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const manifest = params.get("manifest");

    if (manifest) {
      Mirador.viewer({
        id: "viewer",
        language: "ja",
        windows: [{ manifestId: manifest }]
      });
    } else {
      document.body.innerHTML = '<div style="padding:20px;font-family:sans-serif;color:#666;">manifest が指定されていません。</div>';
    }
  </script>
</body>
</html>
