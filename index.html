<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>夏目漱石自筆の漢詩原稿・草稿コレクション</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #e5e7eb;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #eef2f7;
      --accent-line: #d6deea;
      --btn: #374151;
      --btn-hover: #1f2937;
      --sidebar-w: 300px;
      --text-pane-w: 420px;
      --shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; width: 100%; height: 100%;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    }
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      gap: 12px;
      width: 100%; height: 100%;
      padding: 12px;
    }
    .sidebar, .viewer-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .sidebar {
      display: flex; flex-direction: column; min-width: 260px;
    }
    .header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fafbfc 100%);
    }
    .title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .sub { color: var(--muted); font-size: 12px; line-height: 1.45; }
    .search-wrap { padding: 12px 14px 10px; border-bottom: 1px solid var(--line); }
    .search {
      width: 100%; border: 1px solid var(--line); background: #fbfbfc;
      border-radius: 12px; padding: 10px 12px; font-size: 14px; outline: none;
    }
    .meta { padding: 0 14px 10px; color: var(--muted); font-size: 11px; }
    .list { overflow: auto; padding: 6px 8px 12px; flex: 1; }
    .item {
      padding: 8px 10px; border-radius: 12px; cursor: pointer;
      margin: 3px 0; border: 1px solid transparent; transition: 0.15s ease;
    }
    .item:hover { background: #fafafa; border-color: #f0f0f0; }
    .item.active { background: var(--accent); border-color: var(--accent-line); }
    .seq { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .label { font-size: 13px; line-height: 1.4; word-break: break-word; }

    .viewer-wrap {
      display: flex; flex-direction: column; min-width: 0;
    }
    .viewer-header {
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fafbfc 100%);
    }
    .viewer-title { font-size: 16px; font-weight: 700; line-height: 1.35; margin-bottom: 8px; }
    .viewer-meta {
      display: grid; gap: 3px; font-size: 12px; color: var(--muted); line-height: 1.4; margin-bottom: 8px;
    }
    .viewer-meta strong { color: var(--text); font-weight: 600; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
    .btn {
      appearance: none; border: 1px solid var(--line); background: white; color: var(--text);
      border-radius: 12px; padding: 8px 12px; font-size: 13px; cursor: pointer; transition: .15s ease;
    }
    .btn:hover { background: #f8fafc; }
    .btn.primary { background: var(--btn); color: white; border-color: var(--btn); }
    .btn.primary:hover { background: var(--btn-hover); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .notice { margin-top: 4px; font-size: 12px; color: #6b7280; line-height: 1.5; }

    .viewer-body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--text-pane-w);
      gap: 10px;
      flex: 1;
      min-height: 0;
      padding: 10px;
    }
    .manuscript-pane {
      min-width: 0; min-height: 0;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: #fff;
    }
    iframe { width: 100%; height: 100%; border: 0; background: #fff; }

    .text-pane {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fbfbfc;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .text-header {
      padding: 12px 14px 8px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }
    .text-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .text-sub { font-size: 11px; color: var(--muted); line-height: 1.4; }
    .text-content {
      flex: 1;
      overflow: auto;
      padding: 12px 14px 14px;
      font-size: 12px;
      line-height: 1.42;
      color: #111827;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .text-block-title {
      font-size: 13px; font-weight: 700; line-height: 1.4; margin-bottom: 10px; color: #1f2937;
    }
    .text-block-body {
      font-size: 11.5px; line-height: 1.45; white-space: pre-wrap; word-break: break-word;
    }

    @media (max-width: 1180px) {
      .app { grid-template-columns: 280px 1fr; }
      :root { --text-pane-w: 360px; }
    }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; grid-template-rows: 34% 1fr; }
      .viewer-body { grid-template-columns: 1fr; grid-template-rows: 1fr 240px; }
      .sidebar { min-height: 240px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="header">
        <div class="title">夏目漱石自筆の漢詩原稿・草稿コレクション</div>
        <div class="sub">左側に総目录、右側に手稿画像と完成テクストを対照表示。</div>
        <div class="sub" style="margin-top:6px;">製作者：薄鋒（BO Feng）</div>
      </div>
      <div class="search-wrap">
        <input id="search" class="search" type="text" placeholder="番号・題名で検索" />
      </div>
      <div class="meta">左から作品を選択すると、右側で手稿と完成テクストを並べて閲覧できます。</div>
      <div id="list" class="list"></div>
    </aside>

    <main class="viewer-wrap">
      <div class="viewer-header">
        <div id="currentTitle" class="viewer-title">読み込み中…</div>
        <div class="viewer-meta">
          <div><strong>引用元:</strong> <span id="currentSource"></span></div>
          <div><strong>日付:</strong> <span id="currentDate"></span></div>
          <div><strong>表示方式:</strong> <span id="currentMode"></span></div>
        </div>
        <div class="actions">
          <button id="btnSingle" class="btn primary">単独表示</button>
          <button id="btnDay" class="btn">同日並列</button>
          <button id="btnMonth" class="btn">同月並列</button>
          <button id="btnYear" class="btn">同年並列</button>
        </div>
        <div class="notice">右側には完成テクストを首単位で表示しています。</div>
      </div>

      <div class="viewer-body">
        <div class="manuscript-pane">
          <iframe id="frame"></iframe>
        </div>
        <div class="text-pane">
          <div class="text-header">
            <div id="textTitle" class="text-title">完成テクスト</div>
            <div id="textSub" class="text-sub">作品を選択すると、この欄に当該作品の完成テクストを首単位で表示します。</div>
          </div>
          <div id="textContent" class="text-content">完成テクストを読み込み中…</div>
        </div>
      </div>
    </main>
  </div>

<script>
  const base = "https://scholarbo.github.io/soseki-manuscripts";
  let items = [];
  let currentItem = null;
  let completedTexts = {};

  const list = document.getElementById("list");
  const frame = document.getElementById("frame");
  const search = document.getElementById("search");
  const currentTitle = document.getElementById("currentTitle");
  const currentSource = document.getElementById("currentSource");
  const currentDate = document.getElementById("currentDate");
  const currentMode = document.getElementById("currentMode");

  const btnSingle = document.getElementById("btnSingle");
  const btnDay = document.getElementById("btnDay");
  const btnMonth = document.getElementById("btnMonth");
  const btnYear = document.getElementById("btnYear");
  const textTitle = document.getElementById("textTitle");
  const textSub = document.getElementById("textSub");
  const textContent = document.getElementById("textContent");

  async function loadItems() {
    const res = await fetch(`${base}/master.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`master.json の読み込みに失敗しました: ${res.status}`);
    items = await res.json();
  }

  async function loadCompletedTexts() {
    const res = await fetch(`${base}/completed_texts.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`completed_texts.json の読み込みに失敗しました: ${res.status}`);
    const arr = await res.json();
    completedTexts = Object.fromEntries(arr.map(x => [x.id, x]));
  }

  function renderList(filter = "") {
    list.innerHTML = "";
    const q = (filter || "").toLowerCase();
    items
      .filter(item => (item.id || "").toLowerCase().includes(q) || (item.title || "").toLowerCase().includes(q))
      .forEach((item) => {
        const div = document.createElement("div");
        div.className = "item";
        div.dataset.id = item.id;
        div.innerHTML = `<div class="seq">${item.id || ""}</div><div class="label">${item.title || ""}</div>`;
        div.onclick = () => openSingle(item);
        list.appendChild(div);
      });
    highlightCurrent();
  }

  function formatDate(item) {
    return item.date_day || item.date_month || item.date_year || "未記入";
  }

  function highlightCurrent() {
    [...document.querySelectorAll(".item")].forEach(el => {
      el.classList.toggle("active", currentItem && el.dataset.id === currentItem.id);
    });
  }

  function setButtons() {
    const dayCount = currentItem && currentItem.date_day ? items.filter(x => x.date_day === currentItem.date_day).length : 0;
    const monthCount = currentItem && currentItem.date_month ? items.filter(x => x.date_month === currentItem.date_month).length : 0;
    const yearCount = currentItem && currentItem.date_year ? items.filter(x => x.date_year === currentItem.date_year).length : 0;

    btnDay.disabled = dayCount < 2;
    btnMonth.disabled = monthCount < 2;
    btnYear.disabled = yearCount < 2;

    btnDay.textContent = dayCount >= 2 ? `同日並列 (${dayCount})` : "同日並列";
    btnMonth.textContent = monthCount >= 2 ? `同月並列 (${monthCount})` : "同月並列";
    btnYear.textContent = yearCount >= 2 ? `同年並列 (${yearCount})` : "同年並列";
  }

  function normalizeManifestList(value) {
    if (Array.isArray(value)) return value.filter(Boolean);
    if (typeof value === "string" && value.trim()) return value.split("|").map(v => v.trim()).filter(Boolean);
    return [];
  }

  function getDefaultManifest(item) {
    return item.default_manifest || item.manifest || normalizeManifestList(item.manifest_list)[0] || "";
  }

  function getManifestList(item) {
    const list = normalizeManifestList(item.manifest_list);
    if (list.length) return list;
    const single = getDefaultManifest(item);
    return single ? [single] : [];
  }

  function loadManifests(manifests, modeLabel) {
    const clean = manifests.filter(Boolean);
    if (!clean.length) {
      currentMode.textContent = "manifest未設定";
      frame.src = "about:blank";
      return;
    }
    const payload = encodeURIComponent(JSON.stringify(clean));
    frame.src = `${base}/mirador-frame-multi-20260416-012702-f65f15.html?manifests=${payload}`;
    currentMode.textContent = modeLabel;
  }

  function renderCompletedText(workId) {
    const data = completedTexts[workId];
    if (!data) {
      textTitle.textContent = "完成テクスト";
      textSub.textContent = "該当作品の完成テクスト未登録";
      textContent.innerHTML = "未登録";
      return;
    }
    textTitle.textContent = "完成テクスト";
    textSub.textContent = data.title || "";
    const titleHtml = `<div class="text-block-title">${escapeHtml(data.title || "")}</div>`;
    const bodyHtml = `<div class="text-block-body">${escapeHtml(data.text_block || "")}</div>`;
    textContent.innerHTML = titleHtml + bodyHtml;
  }

  function escapeHtml(str) {
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;");
  }

  function openSingle(item) {
    currentItem = item;
    currentTitle.textContent = item.title || "無題";
    currentSource.textContent = item.source || "未記入";
    currentDate.textContent = formatDate(item);
    const manifests = getManifestList(item);
    const modeLabel = manifests.length > 1 ? `作品表示（${manifests.length}版）` : "単独表示";
    loadManifests(manifests, modeLabel);
    renderCompletedText(item.id);
    highlightCurrent();
    setButtons();
    setActiveMode(btnSingle);
  }

  function openGroup(kind) {
    if (!currentItem) return;
    let group = [];
    let label = "単独表示";

    if (kind === "day" && currentItem.date_day) {
      group = items.filter(x => x.date_day === currentItem.date_day);
      label = `同日並列（${currentItem.date_day}）`;
    } else if (kind === "month" && currentItem.date_month) {
      group = items.filter(x => x.date_month === currentItem.date_month);
      label = `同月並列（${currentItem.date_month}）`;
    } else if (kind === "year" && currentItem.date_year) {
      group = items.filter(x => x.date_year === currentItem.date_year);
      label = `同年並列（${currentItem.date_year}）`;
    }

    if (!group.length) return;
    loadManifests(group.map(x => getDefaultManifest(x)), label);
    renderCompletedText(currentItem.id);
    setActiveMode(kind === "day" ? btnDay : kind === "month" ? btnMonth : btnYear);
  }

  function setActiveMode(activeBtn) {
    [btnSingle, btnDay, btnMonth, btnYear].forEach(btn => btn.classList.toggle("primary", btn === activeBtn));
  }

  search.addEventListener("input", e => renderList(e.target.value));
  btnSingle.addEventListener("click", () => currentItem && openSingle(currentItem));
  btnDay.addEventListener("click", () => openGroup("day"));
  btnMonth.addEventListener("click", () => openGroup("month"));
  btnYear.addEventListener("click", () => openGroup("year"));

  async function init() {
    try {
      await Promise.all([loadItems(), loadCompletedTexts()]);
      renderList();
      if (items.length) {
        openSingle(items[0]);
      } else {
        currentTitle.textContent = "データがありません";
        currentSource.textContent = "";
        currentDate.textContent = "";
        currentMode.textContent = "";
        textContent.innerHTML = "データがありません";
      }
    } catch (err) {
      currentTitle.textContent = "読み込みに失敗しました";
      currentSource.textContent = "";
      currentDate.textContent = "";
      currentMode.textContent = "";
      textContent.textContent = err.message;
      list.innerHTML = `<div class="meta">${err.message}</div>`;
      console.error(err);
    }
  }

  init();
</script>
</body>
</html>
