<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>漱石漢詩原稿・草稿ビューア</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #e5e7eb;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #eef2f7;
      --accent-line: #d6deea;
      --sidebar-w: 360px;
      --shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    }
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      gap: 14px;
      width: 100%;
      height: 100%;
      padding: 14px;
    }
    .sidebar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 300px;
    }
    .header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fafbfc 100%);
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
    }
    .sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .search-wrap {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--line);
    }
    .search {
      width: 100%;
      border: 1px solid var(--line);
      background: #fbfbfc;
      border-radius: 14px;
      padding: 11px 13px;
      font-size: 14px;
      outline: none;
    }
    .search:focus {
      border-color: #cbd5e1;
      background: #fff;
    }
    .meta {
      padding: 0 18px 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .list {
      overflow: auto;
      padding: 8px 10px 14px;
      flex: 1;
    }
    .item {
      padding: 10px 12px;
      border-radius: 14px;
      cursor: pointer;
      margin: 4px 0;
      border: 1px solid transparent;
      transition: 0.15s ease;
    }
    .item:hover {
      background: #fafafa;
      border-color: #f0f0f0;
    }
    .item.active {
      background: var(--accent);
      border-color: var(--accent-line);
    }
    .seq {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .label {
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }
    .viewer-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .viewer-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fafbfc 100%);
    }
    .viewer-title {
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .viewer-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }
    iframe {
      width: 100%;
      height: calc(100% - 64px);
      border: 0;
      background: #fff;
    }
    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 40% 1fr;
      }
      .sidebar {
        min-height: 260px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="header">
        <div class="title">漱石漢詩原稿・草稿ビューア</div>
        <div class="sub">左側に固定の総目录、右側に Mirador。前十首版。</div>
      </div>
      <div class="search-wrap">
        <input id="search" class="search" type="text" placeholder="番号・題名で検索" />
      </div>
      <div class="meta">点击左侧条目，在右侧打开对应作品。</div>
      <div id="list" class="list"></div>
    </aside>

    <main class="viewer-wrap">
      <div class="viewer-header">
        <div id="currentTitle" class="viewer-title">読み込み中…</div>
        <div id="currentSub" class="viewer-sub"></div>
      </div>
      <iframe id="frame"></iframe>
    </main>
  </div>

  <script>
    const base = 'https://scholarbo.github.io/soseki-manuscripts';
    const items = [
      ["001-kodai-01", "001. 鴻台〔二首・其一〕"],
      ["002-kodai-02", "002. 鴻台〔二首・其二〕"],
      ["003-daiga", "003. 題画"],
      ["004-okuda-kikoku", "004. 送奥田詞兄帰国"],
      ["005-rishu-jiyujin-in", "005. 離愁次友人韻"],
      ["006-sokuji", "006. 即時"],
      ["007-sokuji-01", "007. 即時〔二首・其一〕"],
      ["008-sokuji-02", "008. 即時〔二首・其二〕"],
      ["009-nanakusa-01", "009. 〔「『七草集』評」より九首・其一〕"],
      ["010-nanakusa-02", "010. 〔「『七草集』評」より九首・其二〕"]
    ];

    const list = document.getElementById("list");
    const frame = document.getElementById("frame");
    const search = document.getElementById("search");
    const currentTitle = document.getElementById("currentTitle");
    const currentSub = document.getElementById("currentSub");

    function renderList(filter = "") {
      list.innerHTML = "";
      const q = (filter || "").toLowerCase();

      items
        .filter(([id, label]) => id.toLowerCase().includes(q) || label.toLowerCase().includes(q))
        .forEach(([id, label], i) => {
          const div = document.createElement("div");
          div.className = "item";
          div.dataset.id = id;
          div.innerHTML = `<div class="seq">${id}</div><div class="label">${label}</div>`;
          div.onclick = () => openManifest(id, label);
          list.appendChild(div);
        });
    }

    function openManifest(id, label) {
      const manifest = `${base}/manifests/manifest-${id}.json`;
      frame.src = `${base}/mirador-frame.html?manifest=${encodeURIComponent(manifest)}`;
      currentTitle.textContent = label;
      currentSub.textContent = manifest;
      [...document.querySelectorAll(".item")].forEach(el => {
        el.classList.toggle("active", el.dataset.id === id);
      });
    }

    search.addEventListener("input", e => {
      renderList(e.target.value);
    });

    renderList();
    openManifest(items[0][0], items[0][1]);
  </script>
</body>
</html>
