    async function exists(url) {
      try {
        const res = await fetch(url, { method: 'GET', cache: 'no-store' });
        if (!res.ok) return false;
        const text = await res.text();
        return text.includes('"type"') && (text.includes('"Manifest"') || text.includes('"Collection"'));
      } catch (e) {
        return false;
      }
    }

    async function buildViewer() {
      const status = document.getElementById('status');
      const available = [];

      for (const item of manifests) {
        const ok = await exists(item.id);
        if (ok) available.push({
          manifestId: item.id,
          provider: "漱石漢詩原稿・草稿"
        });
      }

      status.textContent = `利用可能 manifest: ${available.length} / ${manifests.length}`;

      const windows = available.length > 0 ? [{ manifestId: available[0].manifestId }] : [];

      Mirador.viewer({
        id: "viewer",
        language: "ja",
        catalog: available,
        windows: windows,
        workspace: {
          type: 'single'
        },
        theme: {
          palette: {
            primary: {
              main: '#6b7280'
            }
          }
        }
      });
    }

    buildViewer();
  </script>
