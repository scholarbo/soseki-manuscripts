<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>漱石漢詩原稿・草稿ビューア</title>
  <script src="https://unpkg.com/mirador@3.3.0/dist/mirador.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/mirador@3.3.0/dist/css/mirador-combined.min.css" />
  <style>
    html, body, #viewer {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #fff;
    }
  </style>
</head>
<body>
  <div id="viewer"></div>

  <script>
    const manifestIds = [
      "001-kodai-01",
      "002-kodai-02",
      "003-daiga",
      "004-okuda-kikoku",
      "005-rishu-jiyujin-in",
      "006-sokuji",
      "007-sokuji-01",
      "008-sokuji-02",
      "009-nanakusa-01",
      "010-nanakusa-02"
    ];

    const labels = {
      "001-kodai-01": "001. 鴻台〔二首・其一〕",
      "002-kodai-02": "002. 鴻台〔二首・其二〕",
      "003-daiga": "003. 題画",
      "004-okuda-kikoku": "004. 送奥田詞兄帰国",
      "005-rishu-jiyujin-in": "005. 離愁次友人韻",
      "006-sokuji": "006. 即時",
      "007-sokuji-01": "007. 即時〔二首・其一〕",
      "008-sokuji-02": "008. 即時〔二首・其二〕",
      "009-nanakusa-01": "009. 〔「『七草集』評」より九首・其一〕",
      "010-nanakusa-02": "010. 〔「『七草集』評」より九首・其二〕"
    };

    const base = "https://scholarbo.github.io/soseki-manuscripts/manifests/manifest-";

    const catalog = manifestIds.map(id => ({
      manifestId: `${base}${id}.json`,
      title: labels[id],
      provider: "漱石漢詩原稿・草稿"
    }));

    Mirador.viewer({
      id: "viewer",
      language: "ja",
      catalog: catalog,
      windows: [
        {
          manifestId: `${base}001-kodai-01.json`
        },
        {
          manifestId: `${base}002-kodai-02.json`
        }
      ],
      workspaceControlPanel: {
        enabled: true
      },
      window: {
        allowClose: true,
        allowFullscreen: true,
        allowMaximize: true
      }
    });

    // 資料を追加パネルを自動で開く
    window.addEventListener("load", () => {
      setTimeout(() => {
        const buttons = [...document.querySelectorAll("button")];
        const addBtn = buttons.find(btn =>
          btn.textContent.includes("資料を追加") ||
          btn.getAttribute("aria-label")?.includes("Add resource") ||
          btn.getAttribute("aria-label")?.includes("資料を追加")
        );
        if (addBtn) addBtn.click();
      }, 1200);
    });
  </script>
</body>
</html>
