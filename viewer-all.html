<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>漱石漢詩原稿・草稿ビューア</title>
  <script src="https://unpkg.com/mirador@3.3.0/dist/mirador.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/mirador@3.3.0/dist/css/mirador-combined.min.css" />
  <style>
    html, body, #viewer {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #fff;
    }
  </style>
</head>
<body>
  <div id="viewer"></div>

  <script>
    const manifestIds = [
      "001-kodai-01",
      "002-kodai-02",
      "003-daiga",
      "004-okuda-kikoku",
      "005-rishu-jiyujin-in",
      "006-sokuji",
      "007-sokuji-01",
      "008-sokuji-02",
      "009-nanakusa-01",
      "010-nanakusa-02"
    ];

    const base = "https://scholarbo.github.io/soseki-manuscripts/manifests/manifest-";

    const catalog = manifestIds.map(id => ({
      manifestId: `${base}${id}.json`,
      provider: "漱石漢詩原稿・草稿"
    }));

    Mirador.viewer({
      id: "viewer",
      language: "ja",
      catalog: catalog,
      windows: [
        {
          manifestId: `${base}001-kodai-01.json`,
          sideBarOpen: false
        },
        {
          manifestId: `${base}002-kodai-02.json`,
          sideBarOpen: false
        }
      ]
    });
  </script>
</body>
</html>
