<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mirador</title>

  <script src="https://unpkg.com/mirador@3.3.0/dist/mirador.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/mirador@3.3.0/dist/css/mirador-combined.min.css" />

  <style>
    html, body, #viewer {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #fff;
    }

    /* ===== 顶部栏：彻底隐藏 ===== */
    .mirador-window-top-bar,
    .MuiToolbar-root.MuiToolbar-dense.mirador-window-top-bar{
      display: none !important;
      height: 0 !important;
      min-height: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow: hidden !important;
      border: 0 !important;
      box-shadow: none !important;
    }

    /* 防止顶部留白 */
    .mirador-viewer,
    .mirador-workspace,
    .mirador-workspace-viewport,
    .mirador-window,
    .mirador-osd-container{
      margin-top: 0 !important;
      padding-top: 0 !important;
    }

    /* ===== 底部栏透明化 ===== */
    .mirador-canvas-nav,
    .MuiPaper-root.mirador-canvas-nav{
      background: transparent !important;
      box-shadow: none !important;
      border: 0 !important;
    }

    .mirador77,
    .mirador-osd-navigation,
    .mirador-osd-info{
      background: transparent !important;
      box-shadow: none !important;
      border: 0 !important;
    }

    /* 页码文字 */
    .mirador-canvas-count,
    .mirador-canvas-label{
      color: rgba(20,20,20,0.78) !important;
      text-shadow: 0 1px 2px rgba(255,255,255,.55);
    }

    /* 按钮轻量悬浮 */
    .mirador-canvas-nav .MuiIconButton-root{
      background: rgba(255,255,255,.18) !important;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 999px;
    }

    .mirador-canvas-nav .MuiIconButton-root:hover{
      background: rgba(255,255,255,.32) !important;
    }

    .mirador75{
      background: transparent !important;
      border: 0 !important;
    }

  </style>
</head>

<body>
  <div id="viewer"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const manifestsRaw = params.get("manifests");
    let manifests = [];

    try {
      manifests = manifestsRaw ? JSON.parse(manifestsRaw) : [];
    } catch (e) {
      console.error("manifests parse error:", e);
      manifests = [];
    }

    const windows = Array.isArray(manifests)
      ? manifests.map(m => {
          if (typeof m === "string") {
            return { manifestId: m, maximized: true };
          }
          if (m && m.manifest_url) {
            return { manifestId: m.manifest_url, maximized: true };
          }
          return null;
        }).filter(Boolean)
      : [];

    if (windows.length > 0) {
      Mirador.viewer({
        id: "viewer",
        language: "ja",
        windows: windows,
        window: {
          allowClose: true,
          allowMaximize: true,
          allowFullscreen: true
        },
        workspace: {
          showZoomControls: true
        }
      });
    } else {
      document.body.innerHTML = `
        <div style="padding:20px;color:#666;">
          manifest が指定されていません
        </div>
      `;
    }
  </script>
</body>
</html>
