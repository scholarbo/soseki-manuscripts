<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mirador Frame Multi</title>
  <script src="https://unpkg.com/mirador@3.3.0/dist/mirador.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/mirador@3.3.0/dist/css/mirador-combined.min.css" />
  <style>
    html, body, #viewer {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #fff;
    }
    .msg {
      padding: 20px;
      color: #6b7280;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      line-height: 1.8;
    }
    .msg code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="viewer"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const manifestsRaw = params.get("manifests");
    let manifests = [];

    try {
      manifests = manifestsRaw ? JSON.parse(manifestsRaw) : [];
    } catch (e) {
      console.error("manifests parse error:", e);
      manifests = [];
    }

    const windows = Array.isArray(manifests)
      ? manifests
          .map((m) => {
            if (typeof m === "string" && m.trim() !== "") {
              return { manifestId: m, maximized: true };
            }

            if (
              m &&
              typeof m === "object" &&
              typeof m.manifest_url === "string" &&
              m.manifest_url.trim() !== ""
            ) {
              return { manifestId: m.manifest_url, maximized: true };
            }

            return null;
          })
          .filter(Boolean)
      : [];

    console.log("manifests:", manifests);
    console.log("windows:", windows);

    if (windows.length > 0) {
      Mirador.viewer({
        id: "viewer",
        language: "ja",
        windows: windows,
        window: {
          allowClose: true,
          allowMaximize: true,
          allowFullscreen: true
        },
        workspace: {
          showZoomControls: true
        }
      });
    } else {
      document.body.innerHTML = `
        <div class="msg">
          manifest が指定されていません。<br>
          URL パラメータ <code>?manifests=...</code> を確認してください。
        </div>
      `;
    }
  </script>
</body>
</html>
