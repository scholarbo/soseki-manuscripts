<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mirador</title>

  <script src="https://unpkg.com/mirador@3.3.0/dist/mirador.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/mirador@3.3.0/dist/css/mirador-combined.min.css" />

  <style>
    html, body, #viewer {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #fff;
    }

    /* ===== 顶部栏：彻底隐藏 ===== */
    .mirador-window-top-bar,
    .MuiToolbar-root.MuiToolbar-dense.mirador-window-top-bar{
      display: none !important;
      height: 0 !important;
      min-height: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow: hidden !important;
      border: 0 !important;
      box-shadow: none !important;
    }

    /* 防止顶部留白 */
    .mirador-viewer,
    .mirador-workspace,
    .mirador-workspace-viewport,
    .mirador-window,
    .mirador-osd-container{
      margin-top: 0 !important;
      padding-top: 0 !important;
    }

    /* ===== 底部栏透明化 ===== */
    .mirador-canvas-nav,
    .MuiPaper-root.mirador-canvas-nav{
      background: transparent !important;
      box-shadow: none !important;
      border: 0 !important;
    }

    .mirador77,
    .mirador-osd-navigation,
    .mirador-osd-info{
      background: transparent !important;
      box-shadow: none !important;
      border: 0 !important;
    }

    .mirador-canvas-count,
    .mirador-canvas-label{
      color: rgba(20,20,20,0.78) !important;
      text-shadow: 0 1px 2px rgba(255,255,255,.55);
    }

    .mirador-canvas-nav .MuiIconButton-root{
      background: rgba(255,255,255,.18) !important;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 999px;
    }

    .mirador-canvas-nav .MuiIconButton-root:hover{
      background: rgba(255,255,255,.32) !important;
    }

    .mirador75{
      background: transparent !important;
      border: 0 !important;
    }

    /* ===== 每个窗口右上角的全屏按钮 ===== */
    .mirador-window {
      position: relative !important;
    }

    .oai-window-fullscreen-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 9999;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(145,171,198,.88);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,.98) 0%, rgba(225,237,249,.96) 100%);
      box-shadow:
        0 10px 22px rgba(31,41,55,.18),
        0 3px 8px rgba(31,41,55,.08),
        inset 0 1px 0 rgba(255,255,255,.95);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #1b3146;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease, opacity .16s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .oai-window-fullscreen-btn:hover {
      transform: scale(1.05);
      box-shadow:
        0 14px 28px rgba(31,41,55,.22),
        0 5px 12px rgba(31,41,55,.10),
        inset 0 1px 0 rgba(255,255,255,.98);
      background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(216,231,247,.99) 100%);
    }

    .oai-window-fullscreen-btn:active {
      transform: scale(.97);
    }

    .oai-window-fullscreen-btn svg {
      width: 19px;
      height: 19px;
      fill: currentColor;
      pointer-events: none;
    }

    .oai-window-fullscreen-btn.is-exit {
      background: linear-gradient(180deg, rgba(47,58,73,.95) 0%, rgba(34,44,59,.98) 100%);
      color: #fff;
      border-color: rgba(47,58,73,.72);
      box-shadow:
        0 12px 24px rgba(31,41,55,.26),
        inset 0 1px 0 rgba(255,255,255,.10);
    }

    .oai-window-fullscreen-btn.is-exit:hover {
      background: linear-gradient(180deg, rgba(59,72,90,.98) 0%, rgba(40,51,67,1) 100%);
    }

    :fullscreen .oai-window-fullscreen-btn,
    :-webkit-full-screen .oai-window-fullscreen-btn {
      top: 16px;
      right: 16px;
      z-index: 2147483647;
    }

  </style>
</head>

<body>
  <div id="viewer"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const manifestsRaw = params.get("manifests");
    let manifests = [];

    try {
      manifests = manifestsRaw ? JSON.parse(manifestsRaw) : [];
    } catch (e) {
      console.error("manifests parse error:", e);
      manifests = [];
    }

    const isSingleWindow = Array.isArray(manifests) && manifests.length === 1;

    const windows = Array.isArray(manifests)
      ? manifests.map(m => {
          if (typeof m === "string") {
            return {
              manifestId: m,
              maximized: isSingleWindow
            };
          }
          if (m && m.manifest_url) {
            return {
              manifestId: m.manifest_url,
              maximized: isSingleWindow
            };
          }
          return null;
        }).filter(Boolean)
      : [];

    const ENTER_ICON = `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"></path>
      </svg>
    `;

    const EXIT_ICON = `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm8 11h-3v-3h-2v5h5v-2zm-3-14v2h3v3h2V5h-5z"></path>
      </svg>
    `;

    function getFullscreenElement() {
      return document.fullscreenElement || document.webkitFullscreenElement || null;
    }

    async function requestFs(el) {
      if (el.requestFullscreen) return el.requestFullscreen();
      if (el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
    }

    async function exitFs() {
      if (document.exitFullscreen) return document.exitFullscreen();
      if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
    }

    function updateButtonState(btn, isExit) {
      btn.classList.toggle('is-exit', isExit);
      btn.setAttribute('aria-label', isExit ? '全屏を終了' : '全屏');
      btn.setAttribute('title', isExit ? '全屏を終了' : '全屏');
      btn.innerHTML = isExit ? EXIT_ICON : ENTER_ICON;
    }

    function wireWindowButton(winEl) {
      if (!winEl || winEl.dataset.oaiFsReady === '1') return;
      winEl.dataset.oaiFsReady = '1';

      const btn = document.createElement('button');
      btn.className = 'oai-window-fullscreen-btn';
      btn.type = 'button';
      updateButtonState(btn, false);

      btn.addEventListener('click', async (ev) => {
        ev.preventDefault();
        ev.stopPropagation();

        const activeFsEl = getFullscreenElement();
        const target = winEl;

        try {
          if (activeFsEl === target) {
            await exitFs();
          } else {
            await requestFs(target);
          }
        } catch (err) {
          console.error('fullscreen toggle failed:', err);
        }
      });

      winEl.appendChild(btn);
    }

    function syncFullscreenButtons() {
      const activeFsEl = getFullscreenElement();
      document.querySelectorAll('.mirador-window').forEach((winEl) => {
        const btn = winEl.querySelector('.oai-window-fullscreen-btn');
        if (!btn) return;
        updateButtonState(btn, activeFsEl === winEl);
      });
    }

    function installWindowButtons() {
      document.querySelectorAll('.mirador-window').forEach(wireWindowButton);
      syncFullscreenButtons();
    }

    if (windows.length > 0) {
      Mirador.viewer({
        id: "viewer",
        language: "ja",
        windows: windows,
        window: {
          allowClose: true,
          allowMaximize: true,
          allowFullscreen: true
        },
        workspace: {
          showZoomControls: true
        }
      });

      const mo = new MutationObserver(() => {
        installWindowButtons();
      });

      const startObserver = () => {
        const root = document.getElementById('viewer');
        if (!root) return;
        mo.observe(root, { childList: true, subtree: true });
        installWindowButtons();
      };

      const boot = () => {
        startObserver();
        setTimeout(installWindowButtons, 300);
        setTimeout(installWindowButtons, 800);
      };

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', boot, { once: true });
      } else {
        boot();
      }

      document.addEventListener('fullscreenchange', syncFullscreenButtons);
      document.addEventListener('webkitfullscreenchange', syncFullscreenButtons);
    } else {
      document.body.innerHTML = `
        <div style="padding:20px;color:#666;">
          manifest が指定されていません
        </div>
      `;
    }
  </script>
</body>
</html>
