<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>漱石漢詩原稿・草稿ビューア</title>
  <script src="https://unpkg.com/mirador@3.3.0/dist/mirador.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/mirador@3.3.0/dist/css/mirador-combined.min.css" />
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #e5e7eb;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #374151;
      --accent-soft: #eef2f7;
      --shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
      --sidebar-w: 340px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    }
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      width: 100%;
      height: 100%;
      gap: 14px;
      padding: 14px;
    }
    .sidebar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 280px;
    }
    .sidebar-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fafbfc 100%);
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
    }
    .sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .btn {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 8px 11px;
      font-size: 13px;
      cursor: pointer;
      transition: 0.15s ease;
    }
    .btn:hover { background: #f8fafc; }
    .btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .search-wrap {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--line);
    }
    .search {
      width: 100%;
      border: 1px solid var(--line);
      background: #fbfbfc;
      border-radius: 14px;
      padding: 11px 13px;
      font-size: 14px;
      outline: none;
    }
    .search:focus {
      border-color: #cbd5e1;
      background: #fff;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 18px 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .list {
      flex: 1;
      overflow: auto;
      padding: 0 10px 12px;
    }
    .item {
      display: grid;
      grid-template-columns: 18px 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 11px 12px;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.15s ease;
      margin: 3px 0;
      border: 1px solid transparent;
    }
    .item:hover {
      background: #fafafa;
      border-color: #f0f0f0;
    }
    .item.selected {
      background: var(--accent-soft);
      border-color: #dbe4ef;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      margin-top: 5px;
      background: #d1d5db;
      position: relative;
    }
    .dot.ok { background: #10b981; }
    .dot.missing { background: #d1d5db; }
    .seq {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 3px;
    }
    .label {
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }
    .tag {
      color: var(--muted);
      font-size: 11px;
      padding-top: 2px;
      white-space: nowrap;
    }
    .hidden { display: none !important; }
    .viewer-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .viewer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fafbfc 100%);
    }
    .viewer-title {
      font-size: 16px;
      font-weight: 700;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .viewer-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }
    #viewer {
      width: 100%;
      height: calc(100% - 64px);
      min-height: 0;
      background: #fff;
    }
    .empty {
      height: calc(100% - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
      padding: 30px;
      text-align: center;
    }
    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 42% 1fr;
      }
      .sidebar {
        min-height: 280px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="title">漱石漢詩原稿・草稿ビューア</div>
        <div class="sub">左側に固定の総目录、右側に Mirador。存在する manifest のみ開きます。</div>
        <div class="toolbar">
          <button class="btn active" id="filterAvailable">已上传</button>
          <button class="btn" id="filterAll">全部</button>
        </div>
      </div>
      <div class="search-wrap">
        <input class="search" id="search" type="text" placeholder="番号・題名で検索" />
      </div>
      <div class="meta">
        <span id="countText">確認中…</span>
        <span id="modeText">已上传のみ</span>
      </div>
      <div class="list" id="list"></div>
    </aside>

    <main class="viewer-panel">
      <div class="viewer-header">
        <div>
          <div class="viewer-title" id="currentTitle">読み込み中…</div>
          <div class="viewer-sub" id="currentSub">manifest を確認しています</div>
        </div>
      </div>
      <div id="viewer"></div>
      <div class="empty hidden" id="emptyState">表示できる manifest がまだありません。</div>
    </main>
  </div>

i-manuscripts/manifests/manifest-210-mitei-02.json"}, {"seq": 211, "file_name": "211-mitei-03", "title_ja": "211. 未定稿三", "manifest": "https://scholarbo.github.io/soseki-manuscripts/manifests/manifest-211-mitei-03.json"}, {"seq": 212, "file_name": "212-mitei-04", "title_ja": "212. 未定稿四", "manifest": "https://scholarbo.github.io/soseki-manuscripts/manifests/manifest-212-mitei-04.json"}, {"seq": 213, "file_name": "213-mitei-05", "title_ja": "213. 未定稿五", "manifest": "https://scholarbo.github.io/soseki-manuscripts/manifests/manifest-213-mitei-05.json"}, {"seq": 214, "file_name": "214-mitei-06", "title_ja": "214. 未定稿六", "manifest": "https://scholarbo.github.io/soseki-manuscripts/manifests/manifest-214-mitei-06.json"}, {"seq": 215, "file_name": "215-mitei-07", "title_ja": "215. 未定稿七", "manifest": "https://scholarbo.github.io/soseki-manuscripts/manifests/manifest-215-mitei-07.json"}, {"seq": 216, "file_name": "216-mitei-08", "title_ja": "216. 未定稿八", "manifest": "https://scholarbo.github.io/soseki-manuscripts/manifests/manifest-216-mitei-08.json"}];
    let showAvailableOnly = true;
    let availableMap = new Map();
    let selectedId = null;
    let viewerInstance = null;

    const listEl = document.getElementById('list');
    const searchEl = document.getElementById('search');
    const countTextEl = document.getElementById('countText');
    const modeTextEl = document.getElementById('modeText');
    const currentTitleEl = document.getElementById('currentTitle');
    const currentSubEl = document.getElementById('currentSub');
    const emptyStateEl = document.getElementById('emptyState');
    const viewerEl = document.getElementById('viewer');
    const btnAvailable = document.getElementById('filterAvailable');
    const btnAll = document.getElementById('filterAll');

    function normalize(text) {
      return (text || '').toLowerCase();
    }

    async function manifestExists(url) {
      try {
        const res = await fetch(url, { method: 'GET', cache: 'no-store' });
        return res.ok;
      } catch (e) {
        return false;
      }
    }

    function filteredItems() {
      const q = normalize(searchEl.value);
      return ITEMS.filter(item => {
        const available = availableMap.get(item.file_name) === true;
        if (showAvailableOnly && !available) return false;
        if (!q) return true;
        return normalize(item.file_name).includes(q) || normalize(item.title_ja).includes(q) || String(item.seq).padStart(3, '0').includes(q);
      });
    }

    function renderList() {
      const rows = filteredItems();
      listEl.innerHTML = '';
      const availableCount = ITEMS.filter(x => availableMap.get(x.file_name) === true).length;
      countTextEl.textContent = `可用 ${availableCount} / 全部 ${ITEMS.length}`;
      modeTextEl.textContent = showAvailableOnly ? '已上传のみ' : '显示全部';

      if (!rows.length) {
        const div = document.createElement('div');
        div.style.color = '#6b7280';
        div.style.fontSize = '13px';
        div.style.padding = '14px';
        div.textContent = '没有符合条件的条目。';
        listEl.appendChild(div);
        return;
      }

      for (const item of rows) {
        const available = availableMap.get(item.file_name) === true;
        const row = document.createElement('div');
        row.className = 'item' + (item.file_name === selectedId ? ' selected' : '');
        row.innerHTML = `
          <div class="dot ${available ? 'ok' : 'missing'}"></div>
          <div>
            <div class="seq">${String(item.seq).padStart(3, '0')}</div>
            <div class="label">${item.title_ja}</div>
          </div>
          <div class="tag">${available ? '可用' : '未上传'}</div>
        `;
        row.addEventListener('click', () => {
          if (!available) return;
          selectedId = item.file_name;
          openManifest(item);
          renderList();
        });
        listEl.appendChild(row);
      }
    }

    function openManifest(item) {
      currentTitleEl.textContent = item.title_ja;
      currentSubEl.textContent = item.manifest;
      emptyStateEl.classList.add('hidden');
      viewerEl.classList.remove('hidden');
      viewerEl.innerHTML = '';
      viewerInstance = Mirador.viewer({
        id: 'viewer',
        language: 'ja',
        windows: [{ manifestId: item.manifest }],
        window: {
          allowClose: false,
          allowMaximize: true,
          sideBarOpenByDefault: false
        },
        workspace: {
          showZoomControls: true
        }
      });
    }

    async function init() {
      currentTitleEl.textContent = 'manifest を確認中…';
      currentSubEl.textContent = '少々お待ちください';

      const checks = await Promise.all(
        ITEMS.map(async item => {
          const ok = await manifestExists(item.manifest);
          availableMap.set(item.file_name, ok);
          return ok;
        })
      );

      const firstAvailable = ITEMS.find(item => availableMap.get(item.file_name) === true);

      if (firstAvailable) {
        selectedId = firstAvailable.file_name;
        openManifest(firstAvailable);
      } else {
        viewerEl.classList.add('hidden');
        emptyStateEl.classList.remove('hidden');
        currentTitleEl.textContent = '表示可能な manifest がありません';
        currentSubEl.textContent = 'GitHub に manifest をアップロードすると表示されます';
      }

      renderList();
    }

    btnAvailable.addEventListener('click', () => {
      showAvailableOnly = true;
      btnAvailable.classList.add('active');
      btnAll.classList.remove('active');
      renderList();
    });

    btnAll.addEventListener('click', () => {
      showAvailableOnly = false;
      btnAll.classList.add('active');
      btnAvailable.classList.remove('active');
      renderList();
    });

    searchEl.addEventListener('input', renderList);

    init();
  </script>
